version: 2
jobs:
  - id: pt_water_studio_highkey_clean
    input: {path: /home/xinyang/pt_water.cif, frames: last}
    output: {path: /home/xinyang/work/atomstudio/output/pt_water_studio_highkey_clean.png}
    style:
      scene_style: studio_highkey_clean
      atom_styles: &pt_water_atom_styles
        H_custom: {radius: 0.24}
        O_custom: {radius: 0.42}
        Pt_custom: {radius: 1.20}
      atom_style_rules: &pt_water_atom_style_rules
        - selector: {symbol: H}
          style: H_custom
        - selector: {symbol: O}
          style: O_custom
        - selector: {symbol: Pt}
          style: Pt_custom
    structure: &pt_water_structure
      draw_cell: false
      cell_style: {show: false}
      model_view: "-82.4x,-9.6y,-1.0z"
      bonding:
        hbond: {enabled: false}
    camera: &pt_water_camera
      view: top
      frame_scale: 1.06
    render: &pt_water_render
      engine: cycles
      device: auto
      samples: 96
      resolution: [1024, 1024]
      transparent_bg: false

  - id: pt_water_studio_warm_soft
    input: {path: /home/xinyang/pt_water.cif, frames: last}
    output: {path: /home/xinyang/work/atomstudio/output/pt_water_studio_warm_soft.png}
    style:
      scene_style: studio_warm_soft
      atom_styles: *pt_water_atom_styles
      atom_style_rules: *pt_water_atom_style_rules
    structure: *pt_water_structure
    camera: *pt_water_camera
    render: *pt_water_render

  - id: pt_water_studio_cool_rim
    input: {path: /home/xinyang/pt_water.cif, frames: last}
    output: {path: /home/xinyang/work/atomstudio/output/pt_water_studio_cool_rim.png}
    style:
      scene_style: studio_cool_rim
      atom_styles: *pt_water_atom_styles
      atom_style_rules: *pt_water_atom_style_rules
    structure: *pt_water_structure
    camera: *pt_water_camera
    render: *pt_water_render
